name: comicbookapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  #App responsiva
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  assets:
    - assets/images/

  fonts:
     - family: Poppins-Regular
       fonts:
         - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
     - family: Raleway-Regular
       fonts:
         - asset: assets/fonts/Raleway-Regular.ttf

  generate: true

  uses-material-design: true
